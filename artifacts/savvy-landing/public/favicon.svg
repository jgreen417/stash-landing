<svg width="48" height="48" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left card - tilted -->
  <rect x="1.5" y="6" width="10.5" height="7" rx="1.4" fill="hsl(190,55%,40%)" transform="rotate(-16 6.75 9.5)" />
  <!-- Centre card - gold -->
  <rect x="9.25" y="2" width="10.5" height="7" rx="1.4" fill="hsl(45,80%,52%)" />
  <!-- Right card - tilted -->
  <rect x="17" y="6" width="10.5" height="7" rx="1.4" fill="hsl(190,70%,25%)" transform="rotate(16 22.25 9.5)" />
  <!-- Chest lid -->
  <rect x="2.5" y="11.5" width="23.5" height="5.5" rx="3" fill="hsl(190,58%,30%)" />
  <!-- Chest body -->
  <rect x="2.5" y="15" width="23.5" height="11" rx="3" fill="hsl(190,70%,25%)" />
  <!-- Lid/body seam -->
  <rect x="2.5" y="16.5" width="23.5" height="0.75" fill="rgba(0,0,0,0.14)" />
  <!-- Gold latch -->
  <rect x="11" y="17.5" width="6.5" height="5" rx="1.6" fill="hsl(45,80%,50%)" />
  <!-- Latch shine -->
  <rect x="11" y="17.5" width="6.5" height="2.2" rx="1.6" fill="rgba(255,255,255,0.28)" />
</svg>
