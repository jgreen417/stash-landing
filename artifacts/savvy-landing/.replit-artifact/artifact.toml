kind = "web"
previewPath = "/"
title = "Savvy Landing Page"
version = "1.0.0"
id = "artifacts/savvy-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21170

[services.development]
run = "pnpm --filter @workspace/savvy-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/savvy-landing", "run", "build" ]
publicDir = "artifacts/savvy-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21170"
BASE_PATH = "/"
